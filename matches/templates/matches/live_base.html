<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Khel.ai MVP{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
  .glass-card {
    background: rgba(15, 23, 42, 0.72);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  .grid-glow {
    background-image:
      linear-gradient(rgba(148,163,184,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148,163,184,0.08) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  .field-shell input,
  .field-shell select,
  .field-shell textarea {
    width: 100%;
    border-radius: 1rem;
    border: 1px solid rgba(148, 163, 184, 0.18);
    background: rgba(255,255,255,0.92);
    color: #0f172a;
    padding: 0.9rem 1rem;
    font-size: 0.95rem;
    outline: none;
    transition: all 0.2s ease;
  }

  .field-shell input::placeholder,
  .field-shell textarea::placeholder {
    color: #64748b;
  }

  .field-shell input:focus,
  .field-shell select:focus,
  .field-shell textarea:focus {
    border-color: rgba(16, 185, 129, 0.65);
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.12);
    background: #ffffff;
    color: #0f172a;
  }

  .field-shell input[type="checkbox"] {
    width: 1.1rem;
    height: 1.1rem;
    padding: 0;
    border-radius: 0.35rem;
  }

  .field-shell select option {
    color: #0f172a;
    background: #ffffff;
  }
</style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="fixed inset-0 -z-20 bg-[radial-gradient(circle_at_top_left,rgba(16,185,129,0.16),transparent_28%),radial-gradient(circle_at_top_right,rgba(59,130,246,0.14),transparent_24%),radial-gradient(circle_at_bottom,rgba(168,85,247,0.12),transparent_28%)]"></div>
  <div class="fixed inset-0 -z-10 grid-glow opacity-40"></div>

  <nav class="border-b border-white/10 bg-slate-900/75 backdrop-blur-xl">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
      <a href="/" class="flex items-center gap-3">
        <span class="inline-flex h-10 w-10 items-center justify-center rounded-2xl bg-emerald-400/15 text-emerald-300 ring-1 ring-emerald-400/20">
          🏏
        </span>
        <div>
          <p class="text-base font-bold tracking-tight">Khel.ai MVP</p>
          <p class="text-xs text-slate-400">Live scoring · analytics-ready</p>
        </div>
      </a>

      
    </div>
  </nav>

  <main class="mx-auto max-w-7xl px-6 py-8">
    {% if messages %}
      <div class="mb-6 space-y-2">
        {% for message in messages %}
          <div class="glass-card rounded-2xl border border-emerald-400/20 bg-emerald-400/10 px-4 py-3 text-sm text-emerald-200">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
